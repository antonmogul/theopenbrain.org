<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="/favicon_io/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Open Brain – The Retina</title>
    <script>
      // Apply theme/accent/font-pair attributes and reading-size/line-length CSS
      // variables before CSS loads so first paint matches user prefs.
      // Maps must stay in sync with src/composables/usePreferences.js.
      (function () {
        try {
          var d = document.documentElement;
          // Dark mode + font choice are disabled (2026-06-30). Pin to the
          // originals here too so returning users with a stale "dark" / font
          // value in localStorage don't flash before usePreferences runs. Stored
          // values are left untouched so the features can be revived later.
          d.dataset.theme = "light";
          d.dataset.accent = localStorage.getItem("ob.accent") || "magenta";
          d.dataset.fontpair = "ibm-plex-legacy";
          var rm = localStorage.getItem("ob.reduceMotion");
          if (rm === "on") d.dataset.reduceMotion = "1";

          var sizeScale = { compact: 0.95, regular: 1, comfortable: 1.1 };
          var measureMap = { tight: "64ch", standard: "72ch", wide: "80ch" };
          var size = localStorage.getItem("ob.typeSize") || "regular";
          var measure = localStorage.getItem("ob.lineLength") || "standard";
          d.style.setProperty("--reading-size", String(sizeScale[size] || 1));
          d.style.setProperty(
            "--reading-measure",
            measureMap[measure] || "72ch"
          );
        } catch (e) {
          /* private mode / disabled storage — skip */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app" class="w-screen"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
