<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="/favicon_io/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Open Brain – The Retina</title>
    <script>
      // Apply theme/accent/font-pair attributes before CSS loads so first paint matches user prefs.
      (function () {
        try {
          var d = document.documentElement;
          var theme = localStorage.getItem("ob.theme") || "system";
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          d.dataset.theme = resolved;
          d.dataset.accent = localStorage.getItem("ob.accent") || "magenta";
          d.dataset.fontpair =
            localStorage.getItem("ob.fontPair") || "ibm-plex-legacy";
          var rm = localStorage.getItem("ob.reduceMotion");
          if (rm === "on") d.dataset.reduceMotion = "1";
        } catch (e) {
          /* private mode / disabled storage — skip */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app" class="w-screen"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
